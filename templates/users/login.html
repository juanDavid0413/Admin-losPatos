
{% extends 'base.html' %}
{% load static %}
{% block title %}Iniciar Sesión — Billar Los Patos{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center -m-6 bg-gray-950">
  <div class="w-full max-w-sm">
    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-8">
      <div class="border-b border-red-800 mb-2">
        <video id="sidebarVideo" loop muted playsinline class="w-full h-auto">
          <source src="{% static 'img/BillardSoft.mp4' %}" type="video/mp4">
        </video>
      </div>
      <form method="post" class="space-y-5">
        {% csrf_token %}
        {% if form.errors %}
        <div class="bg-red-900/40 border border-red-700 rounded-lg px-4 py-3 text-sm text-red-300">
          Usuario o contraseña incorrectos.
        </div>
        {% endif %}
        <div>
          <label class="block text-sm font-medium text-gray-400 mb-1.5">Usuario</label>
          <input type="text" name="username" autofocus required
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white
                   focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent text-sm">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-400 mb-1.5">Contraseña</label>
          <input type="password" name="password" required
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white
                   focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent text-sm">
        </div>
        <button type="submit"
          class="w-full bg-green-600 hover:bg-green-500 text-white font-semibold py-2.5 rounded-lg transition-colors text-sm">
          Iniciar Sesión
        </button>
      </form>
    </div>
  </div>
</div>

{% endblock %}
